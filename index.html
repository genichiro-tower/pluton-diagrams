        // ============================================================
        // DIAGRAM RENDERER CLASS - COMPLETE IMPLEMENTATION
        // ============================================================
        class DiagramRenderer {
            constructor(canvas, tooltip, statusBar) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.tooltip = tooltip;
                this.statusBar = statusBar;
                this.data = null;
                this.statePositions = {};
                this.transitionPaths = {};
                this.zoom = 1;
                this.offsetX = 0;
                this.offsetY = 0;

                this.physicsStates = {};
                this.draggingState = null;
                this.dragOffsetX = 0;
                this.dragOffsetY = 0;
                this.animationFrame = null;
                this.isDragging = false;
                this._saveTimeout = null;

                this.isPanning = false;
                this.panStartX = 0;
                this.panStartY = 0;
                this.panOffsetX = 0;
                this.panOffsetY = 0;

                this.hoveredState = null;

                this.setupCanvas();
                this.setupInteraction();
                this.updateStatus('Hover state to highlight • Click to drag • Click empty space to pan');
            }

            setupCanvas() {
                if (!this.canvas) return;
                const rect = this.canvas.parentElement?.getBoundingClientRect();
                if (rect) {
                    this.canvas.width = rect.width;
                    this.canvas.height = rect.height;
                }
            }

            updateStatus(message) {
                if (this.statusBar) {
                    this.statusBar.textContent = '🖱 ' + message;
                }
            }

            setupInteraction() {
                if (!this.canvas) return;

                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    this.zoom = Math.max(0.3, Math.min(3, this.zoom + delta));
                    this.render();
                    this.updateStatus(`Zoom: ${Math.round(this.zoom * 100)}%`);
                    setTimeout(() => {
                        this.updateStatus('Hover state to highlight • Click to drag • Click empty space to pan');
                    }, 1000);
                }, { passive: false });

                this.canvas.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;

                    const rect = this.canvas.getBoundingClientRect();
                    const mouseX = (e.clientX - rect.left - this.offsetX) / this.zoom;
                    const mouseY = (e.clientY - rect.top - this.offsetY) / this.zoom;

                    let foundState = null;
                    for (const [id, pos] of Object.entries(this.statePositions)) {
                        if (mouseX >= pos.x && mouseX <= pos.x + pos.width &&
                            mouseY >= pos.y && mouseY <= pos.y + pos.height) {
                            foundState = id;
                            break;
                        }
                    }

                    if (foundState) {
                        this.draggingState = foundState;
                        const pos = this.statePositions[foundState];
                        this.dragOffsetX = mouseX - pos.x;
                        this.dragOffsetY = mouseY - pos.y;
                        this.isDragging = true;
                        this.canvas.style.cursor = 'grabbing';
                        this.updateStatus(`Dragging state: ${this._stateMap?.[foundState]?.label || foundState}`);
                    } else {
                        this.isPanning = true;
                        this.panStartX = e.clientX;
                        this.panStartY = e.clientY;
                        this.panOffsetX = this.offsetX;
                        this.panOffsetY = this.offsetY;
                        this.canvas.style.cursor = 'grabbing';
                        this.updateStatus('Panning diagram');
                    }
                });

                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.isPanning) {
                        const dx = e.clientX - this.panStartX;
                        const dy = e.clientY - this.panStartY;
                        this.offsetX = this.panOffsetX + dx;
                        this.offsetY = this.panOffsetY + dy;
                        this.render();
                        return;
                    }

                    if (this.isDragging && this.draggingState) {
                        const rect = this.canvas.getBoundingClientRect();
                        const mouseX = (e.clientX - rect.left - this.offsetX) / this.zoom;
                        const mouseY = (e.clientY - rect.top - this.offsetY) / this.zoom;

                        const pos = this.statePositions[this.draggingState];
                        const targetX = mouseX - this.dragOffsetX;
                        const targetY = mouseY - this.dragOffsetY;

                        pos.x = targetX;
                        pos.y = targetY;
                        pos.centerX = pos.x + pos.width / 2;
                        pos.centerY = pos.y + pos.height / 2;

                        this.render();
                        this.savePositionsDebounced();
                        return;
                    }

                    const rect = this.canvas.getBoundingClientRect();
                    const mouseX = (e.clientX - rect.left - this.offsetX) / this.zoom;
                    const mouseY = (e.clientY - rect.top - this.offsetY) / this.zoom;

                    let hoveredState = null;
                    for (const [id, pos] of Object.entries(this.statePositions)) {
                        if (mouseX >= pos.x && mouseX <= pos.x + pos.width &&
                            mouseY >= pos.y && mouseY <= pos.y + pos.height) {
                            hoveredState = id;
                            break;
                        }
                    }

                    if (hoveredState !== this.hoveredState) {
                        this.hoveredState = hoveredState;
                        this.render();
                        if (hoveredState) {
                            this.updateStatus(`Hovering: ${this._stateMap?.[hoveredState]?.label || hoveredState}`);
                        } else {
                            this.updateStatus('Hover state to highlight • Click to drag • Click empty space to pan');
                        }
                    }

                    this.handleNoteHover(e);
                });

                this.canvas.addEventListener('mouseup', (e) => {
                    if (this.isPanning) {
                        this.isPanning = false;
                        this.canvas.style.cursor = 'grab';
                        this.updateStatus('Hover state to highlight • Click to drag • Click empty space to pan');
                        return;
                    }

                    if (this.isDragging && this.draggingState) {
                        this.isDragging = false;
                        this.canvas.style.cursor = 'grab';
                        this.updateStatus('Hover state to highlight • Click to drag • Click empty space to pan');
                        this.savePositions();
                        this.draggingState = null;
                    }
                });

                this.canvas.addEventListener('mouseleave', () => {
                    this.hideTooltip();
                    if (this.hoveredState) {
                        this.hoveredState = null;
                        this.render();
                        this.updateStatus('Hover state to highlight • Click to drag • Click empty space to pan');
                    }
                    if (this.isPanning) {
                        this.isPanning = false;
                        this.canvas.style.cursor = 'grab';
                    }
                    if (this.isDragging) {
                        this.isDragging = false;
                        this.canvas.style.cursor = 'grab';
                        this.draggingState = null;
                    }
                });

                this.canvas.addEventListener('contextmenu', (e) => e.preventDefault());

                const resizeObserver = new ResizeObserver(() => {
                    this.setupCanvas();
                    this.render();
                });
                resizeObserver.observe(this.canvas.parentElement);
            }

            savePositionsDebounced() {
                clearTimeout(this._saveTimeout);
                this._saveTimeout = setTimeout(() => this.savePositions(), 500);
            }

            savePositions() {
                if (!this.statePositions || Object.keys(this.statePositions).length === 0) return;
                const positions = {};
                for (const [id, pos] of Object.entries(this.statePositions)) {
                    positions[id] = { x: pos.x, y: pos.y };
                }
                // Save to the current diagram
                if (currentDiagramId) {
                    const diagram = getCurrentDiagram();
                    if (diagram) {
                        diagram.positions = positions;
                        saveDiagrams();
                    }
                }
            }

            handleNoteHover(e) {
                const rect = this.canvas.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left - this.offsetX) / this.zoom;
                const mouseY = (e.clientY - rect.top - this.offsetY) / this.zoom;

                let foundNote = null;
                for (const [id, path] of Object.entries(this.transitionPaths)) {
                    if (path.notePos) {
                        const dx = mouseX - path.notePos.x;
                        const dy = mouseY - path.notePos.y;
                        if (Math.sqrt(dx * dx + dy * dy) < 25) {
                            foundNote = path.note;
                            break;
                        }
                    }
                }

                if (foundNote) {
                    this.showTooltip(e.clientX, e.clientY, foundNote);
                    this.canvas.style.cursor = 'pointer';
                } else {
                    this.hideTooltip();
                    if (!this.isPanning && !this.isDragging && !this.hoveredState) {
                        this.canvas.style.cursor = 'grab';
                    }
                }
            }

            showTooltip(x, y, note) {
                if (!this.tooltip) return;
                const textEl = this.tooltip.querySelector('.note-text');
                if (textEl) textEl.textContent = note;
                this.tooltip.style.display = 'block';
                this.tooltip.style.left = (x + 15) + 'px';
                this.tooltip.style.top = (y - 10) + 'px';

                const rect = this.tooltip.getBoundingClientRect();
                if (rect.right > window.innerWidth) {
                    this.tooltip.style.left = (x - rect.width - 15) + 'px';
                }
                if (rect.bottom > window.innerHeight) {
                    this.tooltip.style.top = (y - rect.height - 10) + 'px';
                }
            }

            hideTooltip() {
                if (this.tooltip) {
                    this.tooltip.style.display = 'none';
                }
            }

            loadData(data, savedPositions = null) {
                this.data = data;
                this.physicsStates = {};
                this.hoveredState = null;
                if (this.animationFrame) {
                    cancelAnimationFrame(this.animationFrame);
                    this.animationFrame = null;
                }
                if (data) {
                    this.calculateLayout(savedPositions);
                } else {
                    this.statePositions = {};
                    this._stateMap = {};
                    this._defaults = {};
                    this._layout = {};
                    this._transitions = [];
                }
                // Center the diagram when loading new data
                this.zoom = 1;
                this.offsetX = 0;
                this.offsetY = 0;
                this.render();
            }

            calculateLayout(savedPositions = null) {
                if (!this.data) return;

                const states = this.data.states;
                const layout = this.data.layout || {};
                const padding = layout.padding || 80;

                const canvasW = this.canvas.width;
                const canvasH = this.canvas.height;

                const defaultWidth = this.data.defaults?.state?.width || 160;
                const defaultHeight = this.data.defaults?.state?.height || 70;

                const adj = {};
                const inDegree = {};
                const stateMap = {};
                states.forEach(s => {
                    adj[s.id] = [];
                    inDegree[s.id] = 0;
                    stateMap[s.id] = s;
                });

                const transitions = this.data.transitions || [];
                transitions.forEach(t => {
                    if (adj[t.from]) {
                        adj[t.from].push(t.to);
                        inDegree[t.to] = (inDegree[t.to] || 0) + 1;
                    }
                });

                const roots = states.filter(s => inDegree[s.id] === 0);
                const startNodes = roots.length > 0 ? roots.map(r => r.id) : [states[0].id];

                const levels = {};
                const visited = new Set();
                const queue = startNodes.map(id => ({ id, level: 0 }));
                startNodes.forEach(id => {
                    visited.add(id);
                    levels[id] = 0;
                });

                let maxLevel = 0;
                while (queue.length > 0) {
                    const { id, level } = queue.shift();
                    maxLevel = Math.max(maxLevel, level);
                    (adj[id] || []).forEach(nextId => {
                        if (!visited.has(nextId)) {
                            visited.add(nextId);
                            const parentLevels = [];
                            for (const [parentId, children] of Object.entries(adj)) {
                                if (children.includes(nextId)) {
                                    parentLevels.push(levels[parentId] || 0);
                                }
                            }
                            const maxParentLevel = Math.max(...parentLevels, 0);
                            levels[nextId] = maxParentLevel + 1;
                            queue.push({ id: nextId, level: levels[nextId] });
                        }
                    });
                }

                const levelGroups = {};
                states.forEach(s => {
                    const lvl = levels[s.id] !== undefined ? levels[s.id] : maxLevel + 1;
                    if (!levelGroups[lvl]) levelGroups[lvl] = [];
                    levelGroups[lvl].push(s.id);
                });

                const levelKeys = Object.keys(levelGroups).sort((a, b) => a - b);
                const numLevels = levelKeys.length;
                const maxStatesInLevel = Math.max(...Object.values(levelGroups).map(arr => arr.length));

                const minSpacingX = 350, maxSpacingX = 500;
                const minSpacingY = 250, maxSpacingY = 400;
                const availableWidth = canvasW - padding * 2;
                const availableHeight = canvasH - padding * 2;

                let spacingX = Math.max(minSpacingX, Math.min(maxSpacingX,
                    (availableWidth - defaultWidth) / (numLevels - 1 || 1) * 1.5));
                let spacingY = Math.max(minSpacingY, Math.min(maxSpacingY,
                    (availableHeight - defaultHeight) / (maxStatesInLevel - 1 || 1) * 1.5));

                if (numLevels <= 1) spacingX = 400;
                if (maxStatesInLevel <= 1) spacingY = 300;

                const totalWidth = (numLevels - 1) * spacingX + defaultWidth;
                const totalHeight = (maxStatesInLevel - 1) * spacingY + defaultHeight;

                if (totalWidth > availableWidth * 1.2) {
                    spacingX = (availableWidth * 0.9 - defaultWidth) / (numLevels - 1 || 1);
                }
                if (totalHeight > availableHeight * 1.2) {
                    spacingY = (availableHeight * 0.9 - defaultHeight) / (maxStatesInLevel - 1 || 1);
                }

                spacingX = Math.max(spacingX, minSpacingX);
                spacingY = Math.max(spacingY, minSpacingY);

                const diagramWidth = (numLevels - 1) * spacingX + defaultWidth;
                const diagramHeight = (maxStatesInLevel - 1) * spacingY + defaultHeight;

                const startX = Math.max(padding, (canvasW - diagramWidth) / 2);
                const startY = Math.max(padding, (canvasH - diagramHeight) / 2);

                const orderedLevels = {};
                if (levelKeys.length > 0) {
                    const firstLevel = levelKeys[0];
                    orderedLevels[firstLevel] = [...levelGroups[firstLevel]];
                }

                for (let i = 1; i < levelKeys.length; i++) {
                    const currentLevel = levelKeys[i];
                    const prevLevel = levelKeys[i - 1];
                    const currentNodes = levelGroups[currentLevel];
                    const prevNodes = orderedLevels[prevLevel] || levelGroups[prevLevel];

                    const nodeScores = currentNodes.map(nodeId => {
                        const parents = [];
                        for (const [parentId, children] of Object.entries(adj)) {
                            if (children.includes(nodeId)) {
                                const parentIndex = prevNodes.indexOf(parentId);
                                if (parentIndex !== -1) parents.push(parentIndex);
                            }
                        }
                        if (parents.length === 0) return { nodeId, score: prevNodes.length / 2 };
                        const sortedParents = parents.sort((a, b) => a - b);
                        const median = sortedParents[Math.floor(sortedParents.length / 2)];
                        return { nodeId, score: median };
                    });

                    nodeScores.sort((a, b) => a.score - b.score);
                    orderedLevels[currentLevel] = nodeScores.map(item => item.nodeId);
                }

                this.statePositions = {};
                levelKeys.forEach((levelKey, li) => {
                    const nodeIds = orderedLevels[levelKey] || levelGroups[levelKey];
                    const count = nodeIds.length;
                    const x = startX + li * spacingX + (defaultWidth / 2);

                    nodeIds.forEach((id, ni) => {
                        const groupHeight = (count - 1) * spacingY + defaultHeight;
                        const yOffset = Math.max(0, (maxStatesInLevel * spacingY - groupHeight) / 2);
                        const y = startY + ni * spacingY + yOffset + (defaultHeight / 2);

                        let posX = x - defaultWidth / 2;
                        let posY = y - defaultHeight / 2;

                        if (savedPositions && savedPositions[id]) {
                            posX = savedPositions[id].x;
                            posY = savedPositions[id].y;
                        }

                        this.statePositions[id] = {
                            x: posX, y: posY,
                            width: defaultWidth, height: defaultHeight,
                            centerX: posX + defaultWidth / 2,
                            centerY: posY + defaultHeight / 2
                        };
                    });
                });

                this._stateMap = stateMap;
                this._defaults = this.data.defaults || {};
                this._layout = layout;
                this._transitions = transitions;
            }

            getOutgoingTransitions(stateId) {
                const outgoing = [];
                if (!this._transitions) return outgoing;
                for (const t of this._transitions) {
                    if (t.from === stateId) {
                        outgoing.push(t);
                    }
                }
                return outgoing;
            }

            getConnectedStates(stateId) {
                const connected = new Set();
                if (!this._transitions) return connected;
                for (const t of this._transitions) {
                    if (t.from === stateId) {
                        connected.add(t.to);
                    }
                }
                return connected;
            }

            render() {
                if (!this.data || !this.statePositions || Object.keys(this.statePositions).length === 0) {
                    const ctx = this.ctx;
                    const W = this.canvas.width;
                    const H = this.canvas.height;
                    ctx.clearRect(0, 0, W, H);
                    const bgColor = this.data?.style?.background || '#1e1e1e';
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#666';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('No diagram loaded', W / 2, H / 2);
                    return;
                }

                const ctx = this.ctx;
                const W = this.canvas.width;
                const H = this.canvas.height;

                ctx.clearRect(0, 0, W, H);

                const bgColor = this.data.style?.background || '#1e1e1e';
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, W, H);

                ctx.save();
                ctx.translate(this.offsetX, this.offsetY);
                ctx.scale(this.zoom, this.zoom);

                const isHovering = this.hoveredState !== null;
                const connectedStates = isHovering ? this.getConnectedStates(this.hoveredState) : new Set();

                this.drawTransitions(ctx, this.hoveredState, connectedStates, isHovering);
                this.drawStates(ctx, this.hoveredState, connectedStates, isHovering);

                ctx.restore();
            }

            drawStates(ctx, hoveredState, connectedStates, isHovering) {
                const defaults = this._defaults.state || {};
                const terminalDefaults = this._defaults.terminal || {};
                const stallDefaults = this._defaults.stall || {};

                Object.keys(this.statePositions).forEach(id => {
                    const pos = this.statePositions[id];
                    const stateData = this._stateMap[id];
                    const type = stateData.type || 'regular';

                    let bgColor = defaults.color || '#2d2d2d';
                    let borderColor = defaults.borderColor || '#666666';

                    const isHighlighted = isHovering && (id === hoveredState || connectedStates.has(id));
                    const isDimmed = isHovering && !isHighlighted;

                    if (type === 'terminal') {
                        bgColor = terminalDefaults.color || '#c62828';
                        borderColor = terminalDefaults.borderColor || '#ef5350';
                    } else if (type === 'stall') {
                        bgColor = stallDefaults.color || '#1565c0';
                        borderColor = stallDefaults.borderColor || '#42a5f5';
                    }
                    if (stateData.color) bgColor = stateData.color;

                    let finalBg = bgColor;
                    let finalBorder = borderColor;

                    if (isHighlighted) {
                        finalBg = this.lightenColor(bgColor, 50);
                        finalBorder = this.lightenColor(borderColor, 70);
                    }

                    const borderRadius = defaults.borderRadius || 8;
                    const borderWidth = defaults.borderWidth || 2;
                    const fontSize = defaults.fontSize || 14;
                    const fontWeight = defaults.fontWeight || 'bold';
                    const fontFamily = defaults.fontFamily || 'Arial';

                    const x = pos.x, y = pos.y, w = pos.width, h = pos.height;

                    ctx.save();
                    if (isDimmed) ctx.globalAlpha = 0.25;

                    if (isHighlighted) {
                        ctx.shadowColor = 'rgba(255,255,255,0.4)';
                        ctx.shadowBlur = 25;
                    } else {
                        ctx.shadowColor = 'rgba(0,0,0,0.3)';
                        ctx.shadowBlur = 10;
                    }
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;

                    ctx.beginPath();
                    ctx.moveTo(x + borderRadius, y);
                    ctx.lineTo(x + w - borderRadius, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + borderRadius);
                    ctx.lineTo(x + w, y + h - borderRadius);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - borderRadius, y + h);
                    ctx.lineTo(x + borderRadius, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - borderRadius);
                    ctx.lineTo(x, y + borderRadius);
                    ctx.quadraticCurveTo(x, y, x + borderRadius, y);
                    ctx.closePath();

                    ctx.fillStyle = finalBg;
                    ctx.fill();
                    ctx.shadowColor = 'transparent';
                    ctx.strokeStyle = finalBorder;
                    ctx.lineWidth = isHighlighted ? borderWidth + 2 : borderWidth;
                    ctx.stroke();

                    const textColor = this.getContrastColor(finalBg);
                    ctx.fillStyle = textColor;
                    ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    const label = stateData.label || id;
                    const maxWidth = w - 20;
                    const lines = this.wrapText(ctx, label, maxWidth);
                    const lineHeight = fontSize * 1.2;
                    const totalHeight = lines.length * lineHeight;
                    const startY = y + h / 2 - totalHeight / 2 + lineHeight / 2;

                    lines.forEach((line, index) => {
                        ctx.fillText(line, x + w / 2, startY + index * lineHeight);
                    });

                    if (type === 'terminal') {
                        ctx.fillStyle = textColor;
                        ctx.font = '12px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText('⏹', x + w / 2, y - 4);
                    } else if (type === 'stall') {
                        ctx.fillStyle = textColor;
                        ctx.font = '12px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText('⏸', x + w / 2, y - 4);
                    }

                    ctx.restore();
                });
            }

            lightenColor(hex, amount) {
                const color = hex.replace('#', '');
                let r = Math.min(255, parseInt(color.substring(0, 2), 16) + amount);
                let g = Math.min(255, parseInt(color.substring(2, 4), 16) + amount);
                let b = Math.min(255, parseInt(color.substring(4, 6), 16) + amount);
                return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
            }

            wrapText(ctx, text, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                for (let i = 0; i < words.length; i++) {
                    const testLine = currentLine + (currentLine ? ' ' : '') + words[i];
                    if (ctx.measureText(testLine).width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = words[i];
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);
                return lines.length > 0 ? lines : [text];
            }

            drawTransitions(ctx, hoveredState, connectedStates, isHovering) {
                const transitions = this._transitions || [];
                const defaults = this._defaults.transition || {};
                const arrowColor = defaults.color || '#888888';
                const lineWidth = defaults.lineWidth || 2;
                const fontSize = defaults.fontSize || 11;
                const fontFamily = defaults.fontFamily || 'Arial';
                const noteColor = defaults.noteColor || '#999999';

                const arrowCurve = this._layout.arrowCurve || 60;
                const noteOffset = this._layout.noteOffset || 35;

                this.transitionPaths = {};

                transitions.forEach(t => {
                    const fromPos = this.statePositions[t.from];
                    const toPos = this.statePositions[t.to];
                    if (!fromPos || !toPos) return;

                    const fromX = fromPos.centerX;
                    const fromY = fromPos.centerY;
                    const toX = toPos.centerX;
                    const toY = toPos.centerY;

                    const isHighlighted = isHovering &&
                        (t.from === hoveredState ||
                            (t.from === hoveredState && connectedStates.has(t.to)));

                    const isDimmed = isHovering && !isHighlighted;

                    const dx = toX - fromX;
                    const dy = toY - fromY;
                    const len = Math.sqrt(dx * dx + dy * dy);
                    const nx = -dy / len;
                    const ny = dx / len;
                    const curveAmount = Math.min(arrowCurve, len * 0.35);
                    const cpX = (fromX + toX) / 2 + nx * curveAmount;
                    const cpY = (fromY + toY) / 2 + ny * curveAmount;

                    this.transitionPaths[t.id] = {
                        fromX, fromY, toX, toY, cpX, cpY,
                        note: t.note || null,
                        notePos: null
                    };

                    ctx.save();
                    if (isDimmed) ctx.globalAlpha = 0.15;

                    ctx.beginPath();
                    ctx.moveTo(fromX, fromY);
                    ctx.quadraticCurveTo(cpX, cpY, toX, toY);

                    let color = t.color || arrowColor;
                    let width = lineWidth;
                    if (isHighlighted) {
                        color = this.lightenColor(color, 80);
                        width = lineWidth + 2;
                    }

                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    const style = t.arrowStyle || defaults.arrowStyle || 'solid';
                    ctx.setLineDash(style === 'dashed' ? [8, 6] : []);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    if (!isDimmed) {
                        this.drawChevron(ctx, fromX, fromY, cpX, cpY, toX, toY, color);
                    }

                    if (t.label && !isDimmed) {
                        const t_pos = 0.4;
                        const labelX = (1 - t_pos) * (1 - t_pos) * fromX + 2 * (1 - t_pos) * t_pos * cpX + t_pos * t_pos * toX;
                        const labelY = (1 - t_pos) * (1 - t_pos) * fromY + 2 * (1 - t_pos) * t_pos * cpY + t_pos * t_pos * toY;

                        const tangentX = 2 * (1 - t_pos) * (cpX - fromX) + 2 * t_pos * (toX - cpX);
                        const tangentY = 2 * (1 - t_pos) * (cpY - fromY) + 2 * t_pos * (toY - cpY);
                        const angle = Math.atan2(tangentY, tangentX);
                        const normalX = -Math.sin(angle);
                        const normalY = Math.cos(angle);

                        const offsetDistance = 18;
                        const finalX = labelX + normalX * offsetDistance;
                        const finalY = labelY + normalY * offsetDistance;

                        const labelColor = t.color || arrowColor;
                        ctx.font = `${fontSize}px ${fontFamily}`;
                        const metrics = ctx.measureText(t.label);
                        const tw = metrics.width + 16;
                        const th = fontSize + 12;

                        ctx.save();
                        ctx.translate(finalX, finalY);
                        ctx.rotate(angle);

                        ctx.fillStyle = 'rgba(30, 30, 30, 0.9)';
                        ctx.shadowColor = 'rgba(0,0,0,0.5)';
                        ctx.shadowBlur = 8;
                        ctx.fillRect(-tw / 2, -th / 2, tw, th);
                        ctx.shadowColor = 'transparent';
                        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(-tw / 2, -th / 2, tw, th);

                        ctx.fillStyle = labelColor;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(t.label, 0, 0);
                        ctx.restore();
                    }

                    if (t.note && !isDimmed) {
                        const noteX = (fromX + toX) / 2 - nx * (noteOffset + 30);
                        const noteY = (fromY + toY) / 2 - ny * (noteOffset + 30);
                        this.transitionPaths[t.id].notePos = { x: noteX, y: noteY };

                        ctx.beginPath();
                        ctx.arc(noteX, noteY, 8, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(50, 50, 70, 0.95)';
                        ctx.fill();
                        ctx.strokeStyle = noteColor;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        ctx.fillStyle = noteColor;
                        ctx.font = 'bold 11px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('i', noteX, noteY + 0.5);
                    }

                    ctx.restore();
                });
            }

            drawChevron(ctx, fromX, fromY, cpX, cpY, toX, toY, color) {
                const t = 0.5;
                const x = (1 - t) * (1 - t) * fromX + 2 * (1 - t) * t * cpX + t * t * toX;
                const y = (1 - t) * (1 - t) * fromY + 2 * (1 - t) * t * cpY + t * t * toY;
                const tangentX = 2 * (1 - t) * (cpX - fromX) + 2 * t * (toX - cpX);
                const tangentY = 2 * (1 - t) * (cpY - fromY) + 2 * t * (toY - cpY);
                const angle = Math.atan2(tangentY, tangentX);
                const size = 10;
                const spread = 0.6;

                const p1x = x - size * Math.cos(angle - spread);
                const p1y = y - size * Math.sin(angle - spread);
                const p2x = x - size * Math.cos(angle + spread);
                const p2y = y - size * Math.sin(angle + spread);

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(p1x, p1y);
                ctx.lineTo(x, y);
                ctx.lineTo(p2x, p2y);
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                ctx.restore();
            }

            getContrastColor(hexColor) {
                const hex = hexColor.replace('#', '');
                const r = parseInt(hex.substr(0, 2), 16);
                const g = parseInt(hex.substr(2, 2), 16);
                const b = parseInt(hex.substr(4, 6), 16);
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                return brightness > 128 ? '#000000' : '#FFFFFF';
            }

            renderToCanvas(exportCanvas, zoomLevel = 1) {
                if (!this.data || !this.statePositions || Object.keys(this.statePositions).length === 0) return;

                const ctx = exportCanvas.getContext('2d');

                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

                for (const [id, pos] of Object.entries(this.statePositions)) {
                    minX = Math.min(minX, pos.x);
                    minY = Math.min(minY, pos.y);
                    maxX = Math.max(maxX, pos.x + pos.width);
                    maxY = Math.max(maxY, pos.y + pos.height);
                }

                for (const [id, path] of Object.entries(this.transitionPaths)) {
                    minX = Math.min(minX, path.fromX, path.toX, path.cpX);
                    minY = Math.min(minY, path.fromY, path.toY, path.cpY);
                    maxX = Math.max(maxX, path.fromX, path.toX, path.cpX);
                    maxY = Math.max(maxY, path.fromY, path.toY, path.cpY);
                }

                const padding = 80;
                minX -= padding;
                minY -= padding;
                maxX += padding;
                maxY += padding;

                const diagramWidth = maxX - minX;
                const diagramHeight = maxY - minY;
                const aspectRatio = diagramWidth / diagramHeight;

                const baseResolution = 1000;
                const scale = zoomLevel;

                let exportWidth, exportHeight;

                if (aspectRatio > 1) {
                    exportWidth = Math.round(baseResolution * scale);
                    exportHeight = Math.round(exportWidth / aspectRatio);
                } else {
                    exportHeight = Math.round(baseResolution * scale);
                    exportWidth = Math.round(exportHeight * aspectRatio);
                }

                exportWidth = Math.max(exportWidth, 500);
                exportHeight = Math.max(exportHeight, 500);

                exportCanvas.width = exportWidth;
                exportCanvas.height = exportHeight;

                const bgColor = this.data.style?.background || '#1e1e1e';
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, exportWidth, exportHeight);

                const fitScale = Math.min(exportWidth / diagramWidth, exportHeight / diagramHeight);
                const offsetX = (exportWidth - diagramWidth * fitScale) / 2 - minX * fitScale;
                const offsetY = (exportHeight - diagramHeight * fitScale) / 2 - minY * fitScale;

                ctx.save();
                ctx.translate(offsetX, offsetY);
                ctx.scale(fitScale, fitScale);
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                // Draw without hover effects
                const isHovering = false;
                const emptySet = new Set();
                this.drawTransitions(ctx, null, emptySet, isHovering);
                this.drawStates(ctx, null, emptySet, isHovering);

                ctx.restore();
            }
        }
    </script>
